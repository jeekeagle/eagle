name: Deploy to GitHub Pages

on:
  # 每次 push 到 main 触发部署
  push:
    branches: [main]
  # 也可以手动在 Actions 页面触发
  workflow_dispatch:

# 部署需要的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 避免重复部署：同一时间只跑一个
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # 显式包含 devDependencies（GitHub 默认就会装）
        run: npm install --include=dev --no-audit --no-fund

      - name: Build
        env:
          # 如果你的仓库名是 antfu-clone，base 就是 /antfu-clone/
          # 如果是 xxx.github.io 用户主页，base 是 /
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
