<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Your Name" />
    <title>Eagle · 个人主页</title>
    <!-- 霞鹜文楷 LXGW WenKai：来自 hermes-doc.aigc.green 的字体 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@latest/style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-mono-webfont@latest/style.css" />
    <script>
      // 还原 antfu 的暗色模式预检测脚本，避免闪烁
      ;(() => {
        const e = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
        const t = localStorage.getItem('vueuse-color-scheme') || 'auto'
        if (t === 'dark' || (e && t !== 'light')) {
          document.documentElement.classList.toggle('dark', true)
        }
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
